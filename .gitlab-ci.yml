variables:
  UV_VERSION: latest
  PYTHON_BASE_VERSION: 3.12
  BASE_LAYER: bookworm-slim

stages:
  - test
  - lint
  - tag
  - publish

# A hidden job template that can be used by different Python versions
.test-template:
  stage: test
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_BASE_VERSION-$BASE_LAYER
  script:
    - echo "uv environment version"
    - uv --version
    - echo "Pinning ${PYTHON_VERSION}"
    - uv python pin ${PYTHON_VERSION}
    - uv sync
    - echo "Using python version:"
    - python --version
    - echo "Running tests with uv"
    - uv run pytest tests


test-py_3.11:
  extends: .test-template
  variables:
    PYTHON_VERSION: "3.11"

test-py_3.12:
  extends: .test-template
  variables:
    PYTHON_VERSION: "3.12"    
    
test-py_3.13:
  extends: .test-template
  variables:
    PYTHON_VERSION: "3.13"    

# Nightly jobs: force fresh environments and dependency upgrades
.nightly-test-template:
  extends: .test-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never
  script:
    - echo "uv environment version"
    - uv --version
    - echo "Pinning ${PYTHON_VERSION}"
    - uv python pin ${PYTHON_VERSION}
    - echo "Forcing fresh install and upgraded dependencies"
    - rm -rf .venv
    - uv cache clean
    - uv sync --upgrade
    - echo "Using python version:"
    - python --version
    - echo "Running tests with uv"
    - uv run pytest tests

nightly-test-py_3.11:
  extends: .nightly-test-template
  variables:
    PYTHON_VERSION: "3.11"

nightly-test-py_3.12:
  extends: .nightly-test-template
  variables:
    PYTHON_VERSION: "3.12"

nightly-test-py_3.13:
  extends: .nightly-test-template
  variables:
    PYTHON_VERSION: "3.13"


lint:
  stage: lint
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_BASE_VERSION-$BASE_LAYER  
  script:
    - echo "uv environment version"
    - uv --version
    - echo "Using python version:"
    - python --version
    - echo "Running uv check with ruff"
    - uv run ruff check src

.rules:
  - if: $CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME == "develop"
    when: always

# Reads the version from pyproject.toml and creates a git tag if it does not
# already exist. Runs only on pushes to main (not on scheduled pipelines).
auto-tag:
  stage: tag
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_BASE_VERSION-$BASE_LAYER
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE != "schedule"
      when: always
    - when: never
  script:
    - VERSION=$(python -c "import tomllib; data=tomllib.load(open('pyproject.toml','rb')); print(data['project']['version'])")
    - TAG="v${VERSION}"
    - echo "Detected version ${TAG}"
    - |
      if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
        echo "Tag ${TAG} already exists, nothing to do"
      else
        echo "Creating tag ${TAG}"
        git config user.email "ci@gitlab"
        git config user.name "GitLab CI"
        git tag "${TAG}"
        git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${TAG}"
      fi

# Builds the package and publishes it to PyPI whenever a vX.Y.Z tag is pushed.
# Requires a PYPI_TOKEN CI/CD variable set in the project's GitLab settings.
publish-to-pypi:
  stage: publish
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_BASE_VERSION-$BASE_LAYER
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      when: always
    - when: never
  script:
    - echo "Building package"
    - uv build
    - echo "Publishing version ${CI_COMMIT_TAG} to PyPI"
    - uv publish --token "${PYPI_TOKEN}"