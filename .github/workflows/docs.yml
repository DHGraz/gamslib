name: Documentation
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install pinned docs deps
        run: |
          python -m pip installl --upgrade pip
          pip install zensical==0.0.33 mkdocstrings-python==2.0.3

      - name: Show docs tool versions
        run: |
           zensical --version
           python -c "import mkdocstrings; print('mkdocstrings', mkdocstrings.__version__)"

      - name: Build docs
        run: zensical build --clean --strict 

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - uses: actions/deploy-pages@v5
        id: deployment
